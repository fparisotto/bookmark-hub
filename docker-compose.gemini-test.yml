services:
  bookmark-hub:
    image: bookmark-hub:latest
    ports:
      - 3000:3000
    depends_on:
      - postgres
      - chrome
    environment:
      RUST_BACKTRACE: full
      RUST_LOG: info,server=debug
      APP_BIND: "[::]:3000"
      APP_DATA_DIR: /data
      HMAC_KEY: test-hmac-key-for-local-development-only
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: main
      PG_PASSWORD: main
      PG_DATABASE: main
      PG_MAX_CONNECTIONS: 5
      LLM_PROVIDER: gemini
      GEMINI_API_KEY: ${GEMINI_API_KEY:?set GEMINI_API_KEY}
      LLM_TEXT_MODEL: gemini-2.5-flash
      LLM_EMBEDDING_MODEL: gemini-embedding-001
      LLM_EMBEDDING_DIMENSION: "768"
      CHROME_HOST: chrome
      CHROME_PORT: 3001
    volumes:
      - bookmark-hub-data:/data
    healthcheck:
      test: curl --fail http://localhost:3000/health || exit 1
      timeout: 2s
      interval: 10s
      start_period: 10s
      retries: 5
    restart: on-failure
  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: main
      POSTGRES_PASSWORD: main
      POSTGRES_DB: main
    volumes:
      - postgres-data:/var/lib/postgresql/data
  chrome:
    image: browserless/chrome:latest
    ports:
      - 3001:3001
    environment:
      - PORT=3001
      - CONCURRENT=10
      - ENABLE_DEBUGGER=true
volumes:
  postgres-data:
  bookmark-hub-data:
