services:
  bookmark-hub:
    image: bookmark-hub:latest
    ports:
      - 3000:3000
    depends_on:
      - postgres
      - ollama
      - ollama-model-puller
      - chrome
    environment:
      RUST_BACKTRACE: full
      RUST_LOG: info,server=debug
      APP_BIND: "[::]:3000"
      APP_DATA_DIR: /data
      HMAC_KEY: test-hmac-key-for-local-development-only
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: main
      PG_PASSWORD: main
      PG_DATABASE: main
      PG_MAX_CONNECTIONS: 5
      LLM_PROVIDER: ollama
      OLLAMA_URL: http://ollama:11434
      LLM_TEXT_MODEL: qwen3.5:4b
      LLM_EMBEDDING_MODEL: qwen3-embedding:0.6b
      LLM_EMBEDDING_DIMENSION: "1024"
      CHROME_HOST: chrome
      CHROME_PORT: 3001
    volumes:
      - bookmark-hub-data:/data
    healthcheck:
      test: curl --fail http://localhost:3000/health || exit 1
      timeout: 2s
      interval: 10s
      start_period: 10s
      retries: 5
    restart: on-failure # needed during startup, until pg is available
  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: main
      POSTGRES_PASSWORD: main
      POSTGRES_DB: main
    volumes:
      - postgres-data:/var/lib/postgresql/data
  ollama:
    image: ollama/ollama:0.15.4
    container_name: ollama
    ports:
      - 11435:11434
    volumes:
      - ollama-data:/root/.ollama
  ollama-model-puller:
    image: curlimages/curl:latest
    command:
      - /bin/sh
      - -c
      - |
        echo "Pulling text model..."
        curl ollama:11434/api/pull -d '{"model":"qwen3.5:4b"}' || exit 1
        echo "Pulling embedding model..."
        curl ollama:11434/api/pull -d '{"model":"qwen3-embedding:0.6b"}' || exit 1
        echo "All models pulled successfully"
    depends_on:
      - ollama
  chrome:
    image: browserless/chrome:latest
    ports:
      - 3001:3001
    environment:
      - PORT=3001
      - CONCURRENT=10
      - ENABLE_DEBUGGER=true
volumes:
  postgres-data:
  ollama-data:
  bookmark-hub-data:
